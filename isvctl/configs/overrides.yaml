# Override Example
#
# Merge this on top of any test config to customize behavior.
# Copy this file, uncomment what you need, and pass it as a second -f flag.
#
# Usage:
#   isvctl test run -f isvctl/configs/suites/k8s.yaml -f isvctl/configs/overrides.yaml
#   isvctl test run -f isvctl/configs/providers/microk8s.yaml -f isvctl/configs/overrides.yaml

# Exclude specific tests by name
tests:
  exclude:
    tests: []
    # - K8sNodeCountCheck
    # - K8sNcclWorkload

    # Exclude by label (e.g., skip slow or workload tests)
    labels: []
    # - slow
    # - workload
