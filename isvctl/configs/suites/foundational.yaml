# Foundational Capability - Axis Placeholder
#
# This platform suite wires NO validations. Its sole purpose is to put
# `foundational` on the capability (platform) axis so module suites whose
# checks are pure provider-API tests with no runtime environment (iam,
# control-plane) can declare `platforms: ["foundational"]` and run once,
# under this column, instead of under every runtime column.
#
# Planner rule: a capability column whose platform suite wires no validations
# has NO platform run. Providers do not ship a foundational config -
# `--platform foundational` plans a modules-only column containing exactly
# the module configs whose checks positively declare this column.

version: "1.0"

tests:
  platform: foundational
  description: "Foundational capability: pure provider-API checks, no runtime environment"
  validations: {}
