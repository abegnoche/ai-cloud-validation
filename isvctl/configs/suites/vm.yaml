# VM (Virtual Machine) Validation - Canonical Contract
#
# Validations-only contract for VM. Provider configs import this file
# and supply their own commands (steps + scripts).
#
# This file defines WHAT to validate, not HOW to run it. Each validation
# only inspects JSON output fields. As long as your scripts output the
# right fields, the validations pass regardless of which cloud you use.
#
# Quick start:
#   1. Copy providers/my-isv/config/vm.yaml to providers/<your-platform>/config/vm.yaml
#   2. Replace stub paths with your platform scripts
#   3. Run: uv run isvctl test run -f isvctl/configs/providers/<your-platform>/config/vm.yaml
#
# See also:
#   - my-isv living example: providers/my-isv/config/vm.yaml
#   - AWS reference: providers/aws/config/vm.yaml + providers/aws/scripts/vm/
#   - Per-step field breakdown: ../suites/README.md

version: "1.0"

tests:
  platform: vm
  cluster_name: "vm-validation"
  description: "VM (virtual machine) GPU validation tests"

  settings:
    # Provider-specific - override in your provider config
    region: ""
    instance_type: ""
    teardown_flag: "{{(env.VM_SKIP_TEARDOWN == 'true') | ternary('--skip-destroy', '')}}"

  # ─── Validations ─────────────────────────────────────────────────
  # These are PROVIDER-AGNOSTIC. They only check JSON field names/values.
  #
  # Layout mirrors bare_metal.yaml:
  #   launch checks -> list -> tags -> serial_console -> console_rbac
  #   -> component_key_access (AUTH03) -> cloud_init
  #   -> describe_instance (SSH / GPU / host anchor, post-reboot)
  #   -> lifecycle (stop / start / reboot)
  #   -> NIM -> teardown
  validations:
    setup_checks:
      step: launch_instance
      checks:
        InstanceStateCheck-vm_setup:
          test_id: "N/A"
          labels: ["vm"]
          expected_state: "running"

    specified_key:
      step: launch_instance
      checks:
        InstanceSpecifiedKeyCheck:
          test_id: "AUTH02-01"
          labels: ["vm"]

    component_key_access:
      step: component_key_access
      checks:
        ComponentKeyAccessCheck:
          test_id: "AUTH03-01"
          labels: ["bare_metal", "iam", "security", "vm"]

    instance_created:
      step: launch_instance
      checks:
        InstanceCreatedCheck:
          test_id: "CNP01-09"
          labels: ["min_req", "vm"]

    list_instances:
      step: list_instances
      checks:
        InstanceListCheck-vm_list_instances:
          test_id: "CNP01-11"
          labels: ["min_req", "vm"]
          min_count: 1

    tag_checks:
      step: verify_tags
      checks:
        InstanceTagCheck-vm_tag:
          test_id: "CNP05-02"
          labels: ["min_req", "vm"]
          required_keys: ["Name", "CreatedBy"]

    serial_console:
      step: serial_console
      checks:
        SerialConsoleCheck-vm_serial_console:
          test_id: "CNP06-03"
          labels: ["min_req", "vm"]

    console_rbac:
      step: console_rbac
      checks:
        ConsoleRbacCheck:
          test_id: "CNP01-16"
          labels: ["iam", "min_req", "security", "vm"]

    virtual_device_hardening:
      step: virtual_device_hardening
      checks:
        VirtualDeviceHardeningCheck:
          test_id: "CNP01-17"
          labels: ["min_req", "security", "vm"]

    cloud_init:
      step: launch_instance
      checks:
        CloudInitCheck-vm_cloud_init:
          test_id: "BOOT02-02"
          labels: ["min_req", "ssh", "vm"]

    # ─── Host-level validations anchored to describe_instance ────────
    # describe_instance runs AFTER reboot, so these checks prove the
    # host and its software survived the full stop/start/reboot lifecycle.
    instance_info:
      step: describe_instance
      checks:
        InstanceStateCheck-vm_instance_info:
          test_id: "N/A"
          labels: ["vm"]
          expected_state: "running"

    ssh:
      step: describe_instance
      checks:
        ConnectivityCheck-vm_ssh:
          test_id: "VMAAS01-01"
          labels: ["vm", "ssh"]
        OsCheck-vm_ssh:
          test_id: "VMAAS05-01"
          labels: ["vm", "ssh"]
          expected_os: "ubuntu"

    gpu:
      step: describe_instance
      checks:
        GpuCheck-vm_gpu:
          test_id: "VMAAS06-01"
          labels: ["vm", "ssh", "gpu"]
          expected_gpus: 1

    host_os:
      step: describe_instance
      checks:
        VcpuPinningCheck-vm_host_os:
          test_id: "VMAAS09-01"
          labels: ["gpu", "ssh", "vm"]
        PciBusCheck-vm_host_os:
          test_id: "VMAAS09-01"
          labels: ["vm", "ssh", "gpu"]
          expected_gpus: 1
        HostSoftwareCheck-vm_host_os:
          test_id: "VMAAS07-01"
          labels: ["gpu", "ssh", "vm"]

    driver_info:
      step: describe_instance
      checks:
        DriverCheck-vm_driver_info:
          test_id: "VMAAS07-01"
          labels: ["vm", "ssh", "gpu"]

    cpu_info:
      step: describe_instance
      checks:
        CpuInfoCheck-vm_cpu_info:
          test_id: "N/A"
          labels: ["vm", "ssh"]

    container_runtime:
      step: describe_instance
      checks:
        ContainerRuntimeCheck-vm_container_runtime:
          test_id: "N/A"
          labels: ["vm", "ssh", "gpu", "workload", "slow"]

    # ─── Lifecycle validations ───────────────────────────────────────
    stop_checks:
      step: stop_instance
      checks:
        InstanceStopCheck-vm_stop:
          test_id: "CNP01-14"
          labels: ["min_req", "vm"]

    start_checks:
      step: start_instance
      checks:
        InstanceStartCheck-vm_start:
          test_id: "CNP01-15"
          labels: ["min_req", "vm"]
        StableIdentifierCheck-vm_start:
          test_id: "CNP08-03"
          labels: ["min_req", "vm"]
          reference_id: "{{steps.launch_instance.instance_id}}"

    start_ssh:
      step: start_instance
      checks:
        # ConnectivityCheck -> VMAAS-XX-01, OsCheck -> VMAAS-XX-05 (declared in the "ssh" section)
        ConnectivityCheck-vm_start_ssh:
          test_id: "VMAAS01-01"
          labels: ["vm", "ssh"]
        OsCheck-vm_start_ssh:
          test_id: "VMAAS05-01"
          labels: ["vm", "ssh"]
          expected_os: "ubuntu"

    start_gpu:
      step: start_instance
      checks:
        # GpuCheck -> VMAAS-XX-06 (declared in the "gpu" section)
        GpuCheck-vm_start_gpu:
          test_id: "VMAAS06-01"
          labels: ["vm", "ssh", "gpu"]
          expected_gpus: 1

    reboot_checks:
      step: reboot_instance
      checks:
        InstanceRebootCheck-vm_reboot:
          test_id: "CNP01-13"
          labels: ["vm"]
          max_uptime: 600
        # StableIdentifierCheck -> CNP08-03 (declared in the "start_checks" section)
        StableIdentifierCheck-vm_reboot:
          test_id: "CNP08-03"
          labels: ["min_req", "vm"]
          reference_id: "{{steps.launch_instance.instance_id}}"

    reboot_state:
      step: reboot_instance
      checks:
        InstanceStateCheck-vm_reboot_state:
          test_id: "N/A"
          labels: ["vm"]
          expected_state: "running"

    reboot_ssh:
      step: reboot_instance
      checks:
        # ConnectivityCheck -> VMAAS-XX-01, OsCheck -> VMAAS-XX-05 (declared in the "ssh" section)
        ConnectivityCheck-vm_reboot_ssh:
          test_id: "VMAAS01-01"
          labels: ["vm", "ssh"]
        OsCheck-vm_reboot_ssh:
          test_id: "VMAAS05-01"
          labels: ["vm", "ssh"]
          expected_os: "ubuntu"

    reboot_gpu:
      step: reboot_instance
      checks:
        # GpuCheck -> VMAAS-XX-06 (declared in the "gpu" section)
        GpuCheck-vm_reboot_gpu:
          test_id: "VMAAS06-01"
          labels: ["vm", "ssh", "gpu"]
          expected_gpus: 1

    # ─── NIM validations ─────────────────────────────────────────────
    nim_health:
      step: deploy_nim
      checks:
        NimHealthCheck-vm_nim_health:
          test_id: "VMAAS12-01"
          labels: ["gpu", "slow", "ssh", "vm", "workload"]

    nim_models:
      step: deploy_nim
      checks:
        NimModelCheck-vm_nim_models:
          test_id: "VMAAS12-01"
          labels: ["gpu", "slow", "ssh", "vm", "workload"]

    nim_inference:
      step: deploy_nim
      checks:
        NimInferenceCheck-vm_nim_inference:
          test_id: "VMAAS12-01"
          labels: ["vm", "ssh", "gpu", "workload", "slow"]
          prompt: "What is CUDA?"
          max_tokens: 50

    # ─── Teardown validations ────────────────────────────────────────
    nim_teardown:
      step: teardown_nim
      checks:
        StepSuccessCheck-vm_nim_teardown:
          test_id: "N/A"
          labels: ["vm"]

    teardown_checks:
      step: teardown
      checks:
        StepSuccessCheck-vm_teardown:
          test_id: "N/A"
          labels: ["vm"]

  exclude:
    labels: []
