# Storage Validation - Canonical Contract
#
# Validations-only contract for the storage capability area. Provider
# configs import this file and supply their own commands (steps + scripts).
#
# This file defines WHAT to validate, not HOW to run it. Each validation
# only inspects JSON output fields. As long as your scripts output the
# right fields, the validations pass regardless of which cloud you use.
#
# Scope: persistent block storage (EBS-style volumes), home-directory
# NFS storage, and high-speed storage (SDS controller + parallel file
# system). Object storage and other checks can land here later.
# High-speed check classes / test_ids keep the HSS* / HSS## naming from
# the offtake High-Speed Storage requirement family
# (docs/requirements/offtake-requirements.md).
#
# Coverage notes:
# - Block volume: a shared fixture launches one instance and creates +
#   attaches a single volume (formatted, mounted, seeded with a sentinel).
#   Test-phase checks reuse that fixture:
#   - snapshot_lifecycle  - DATASVC-XX-02 (issue #321)
#   - volume_resize       - DATASVC-XX-03 (issue #322)
#   - volume_persistence  - DATASVC-XX-04 (issue #323)
# - High-speed storage: SDS controller + parallel FS checks (HSS01–HSS18).
#   Provider scripts are typically self-contained (provision → assert →
#   cleanup) and do not share the block-volume fixture.
#
# Quick start:
#   1. Copy providers/my-isv/config/storage.yaml to providers/<your-platform>/config/storage.yaml
#   2. Replace stub paths with your platform scripts
#   3. Run: uv run isvctl test run -f isvctl/configs/providers/<your-platform>/config/storage.yaml
#
# See also:
#   - my-isv living example: providers/my-isv/config/storage.yaml
#   - AWS reference: providers/aws/config/storage.yaml + providers/aws/scripts/storage/
#   - Per-step field breakdown: ../suites/README.md

version: "1.0"

tests:
  cluster_name: "storage-validation"
  description: "Storage: block volumes and high-speed / parallel filesystem services"

  settings:
    # Provider-specific - override in your provider config
    region: ""
    instance_type: ""
    volume_size_gib: "10"
    teardown_flag: "{{(env.BLOCK_STORAGE_SKIP_TEARDOWN == 'true') | ternary('--skip-destroy', '')}}"

  # ─── Validations ─────────────────────────────────────────────────
  # These are PROVIDER-AGNOSTIC. They only check JSON field names/values.
  validations:
    # ─── Fixture: instance + attached, formatted, seeded volume ──────
    instance_launched:
      step: launch_instance
      checks:
        InstanceStateCheck-storage_instance_launched:
          test_id: "N/A"
          labels: ["storage"]
          requires: [vm, bare_metal]
          expected_state: "running"

    fixture_volume:
      step: create_volume
      checks:
        StepSuccessCheck-storage_fixture_volume:
          test_id: "N/A"
          labels: ["storage"]
          requires: [vm, bare_metal]
        FieldExistsCheck-storage_fixture_volume:
          test_id: "N/A"
          labels: ["storage"]
          requires: [vm, bare_metal]
          fields: ["volume_id", "mount_point", "operations"]
        CrudOperationsCheck-storage_fixture_volume:
          test_id: "N/A"
          labels: ["storage"]
          requires: [vm, bare_metal]
          operations: ["create", "attach", "format", "mount", "write_sentinel"]

    # ─── DATASVC-XX-02: volume snapshots (issue #321) ────────────────
    snapshot_lifecycle:
      step: snapshot_lifecycle
      checks:
        StepSuccessCheck-storage_snapshot_lifecycle:
          test_id: "N/A"
          labels: ["storage"]
          requires: [vm, bare_metal]
        FieldExistsCheck-storage_snapshot_lifecycle:
          test_id: "N/A"
          labels: ["storage"]
          requires: [vm, bare_metal]
          fields: ["volume_id", "snapshot_id", "operations"]
        CrudOperationsCheck-storage_snapshot_lifecycle:
          test_id: "DATASVC02-01"
          labels: ["min_req", "storage"]
          requires: [vm, bare_metal]
          operations: ["create_snapshot", "restore_volume", "verify_data"]

    # ─── DATASVC-XX-03: volume resizing (issue #322) ─────────────────
    volume_resize:
      step: volume_resize
      checks:
        StepSuccessCheck-storage_volume_resize:
          test_id: "N/A"
          labels: ["storage"]
          requires: [vm, bare_metal]
        FieldExistsCheck-storage_volume_resize:
          test_id: "N/A"
          labels: ["storage"]
          requires: [vm, bare_metal]
          fields: ["volume_id", "operations"]
        CrudOperationsCheck-storage_volume_resize:
          test_id: "DATASVC03-01"
          labels: ["min_req", "storage"]
          requires: [vm, bare_metal]
          operations: ["modify_volume", "grow_partition", "resize_filesystem", "verify_size"]

    # ─── DATASVC-XX-04: persistence across restarts (issue #323) ─────
    volume_persistence:
      step: volume_persistence
      checks:
        StepSuccessCheck-storage_volume_persistence:
          test_id: "N/A"
          labels: ["storage"]
          requires: [vm, bare_metal]
        FieldExistsCheck-storage_volume_persistence:
          test_id: "N/A"
          labels: ["storage"]
          requires: [vm, bare_metal]
          fields: ["volume_id", "operations"]
        CrudOperationsCheck-storage_volume_persistence:
          test_id: "DATASVC04-01"
          labels: ["min_req", "storage"]
          requires: [vm, bare_metal]
          operations: ["stop", "start", "verify_attached", "verify_data"]

    # ─── Home directory storage ──────────────────────────────────────
    home_directory:
      step: home_directory_storage
      checks:
        DirectoryFilesystemQuotaCheck:
          test_id: "DIR01-01"
          labels: ["min_req", "storage"]
          requires: [vm, bare_metal]
        DirectoryUsageAccountingCheck:
          test_id: "DIR01-02"
          labels: ["min_req", "storage"]
          requires: [vm, bare_metal]
        DirectoryNfsAvailabilityCheck:
          test_id: "DIR02-01"
          labels: ["min_req", "storage"]
          requires: [vm, bare_metal]

    # ─── High-speed storage: SDS controller ──────────────────────────
    sds_controller:
      checks:
        HssStorageProvisioningCheck:
          test_id: "HSS01-01"
          labels: ["min_req", "storage"]
          requires: []
          step: provision_storage
        HssQosThroughputCheck:
          test_id: "HSS02-01"
          labels: ["min_req", "storage"]
          requires: [vm, bare_metal]
          step: qos_throughput
        HssNonDisruptiveUpgradeCheck:
          test_id: "HSS05-01"
          labels: ["min_req", "storage"]
          requires: []
          step: non_disruptive_upgrade
        HssRdmaMemoryProtectionCheck:
          test_id: "HSS06-01"
          labels: ["min_req", "storage"]
          requires: [vm, bare_metal]
          step: rdma_memory_protection

    # ─── High-speed storage: parallel file system services ───────────
    parallel_fs:
      checks:
        HssParallelFsProvisioningCheck:
          test_id: "HSS07-01"
          labels: ["min_req", "storage"]
          requires: [vm, bare_metal]
          step: provision_parallel_fs
        HssMultipleFilesystemsCheck:
          test_id: "HSS09-01"
          labels: ["min_req", "storage"]
          requires: []
          step: multiple_filesystems
        HssLiveExpansionCheck:
          test_id: "HSS10-01"
          labels: ["min_req", "storage"]
          requires: []
          step: live_expansion
        HssQuotaEnforcementCheck:
          test_id: "HSS12-01"
          labels: ["min_req", "storage"]
          requires: [vm, bare_metal]
          step: quota_enforcement
        HssRootSquashCheck:
          test_id: "HSS13-01"
          labels: ["min_req", "storage"]
          requires: []
          step: root_squash
        HssFlockMountCheck:
          test_id: "HSS14-01"
          labels: ["min_req", "storage"]
          requires: [vm, bare_metal]
          step: flock_mount
        HssChangelogAuditCheck:
          test_id: "HSS15-01"
          labels: ["min_req", "storage"]
          requires: [vm, bare_metal]
          step: changelog_audit
        HssMultipathCheck:
          test_id: "HSS18-01"
          labels: ["min_req", "storage"]
          requires: [vm, bare_metal]
          step: multipath

    # ─── Teardown ────────────────────────────────────────────────────
    teardown_checks:
      step: teardown_volume
      checks:
        StepSuccessCheck-storage_teardown:
          test_id: "N/A"
          labels: ["storage"]
          requires: []

    # Kubernetes storage checks use a normal provider-owned cluster fixture.
    k8s_storage:
      step: ensure_cluster
      checks:
        K8sCsiStorageTypesCheck:
          test_id: "K8S23-04"
          labels: ["kubernetes", "min_req", "storage"]
          requires: [kubernetes]
          # StorageClass names by type; omit (or leave empty) to skip that type.
          # Env overrides: K8S_CSI_BLOCK_SC, K8S_CSI_SHARED_FS_SC, K8S_CSI_NFS_SC.
          block_storage_class: "{{ steps.ensure_cluster.csi.block_storage_class | default('', true) }}"
          shared_fs_storage_class: "{{ steps.ensure_cluster.csi.shared_fs_storage_class | default('', true) }}"
          nfs_storage_class: "{{ steps.ensure_cluster.csi.nfs_storage_class | default('', true) }}"
          pvc_size: "1Gi"
          bind_timeout_s: 120
          namespace_prefix: "isvtest-csi-types"
        K8sCsiStorageQuotaApiCheck:
          test_id: "K8S23-07"
          labels: ["kubernetes", "min_req", "storage"]
          requires: [kubernetes]
          # Uses the block StorageClass by default; skips entirely when unset.
          # per_sc_quota must exceed pvc_request so the usage PVC fits, and
          # over_quota_request must exceed per_sc_quota so admission rejects it.
          storage_class: "{{ steps.ensure_cluster.csi.block_storage_class | default('', true) }}"
          total_quota: "10Gi"
          per_sc_quota: "5Gi"
          pvc_request: "1Gi"
          over_quota_request: "100Gi"
          bind_timeout_s: 120
          quota_settle_s: 30
          namespace_prefix: "isvtest-csi-quota"
        K8sCsiTenantScopedCredentialsCheck:
          test_id: "K8S23-06"
          labels: ["kubernetes", "min_req", "storage"]
          requires: [kubernetes]
          # Pure read-only check: verifies CSI credentials are tenant-scoped
          # by construction (Secret namespaces, labels/annotations, RBAC,
          # and node-plugin volume topology). Skipped entirely when no
          # CSIDriver objects exist.
          csi_driver_namespaces:
            - "kube-system"
          allowed_workload_namespaces: []
          forbidden_labels:
            - "shared-across-clusters=true"
        K8sCsiProvisioningModesCheck:
          test_id: "K8S23-05"
          labels: ["kubernetes", "min_req", "storage"]
          requires: [kubernetes]
          # Exercises dynamic and static CSI provisioning end-to-end with a
          # BusyBox mount + canary-file write/read. Skipped entirely when
          # dynamic_storage_class is unset. The static subtest is skipped
          # (not failed) when static_pv.volume_handle / csi_driver are
          # unset, so providers that don't pre-provision a volume can still
          # run the dynamic probe.
          dynamic_storage_class: "{{ steps.ensure_cluster.csi.block_storage_class | default('', true) }}"
          dynamic_pvc_size: "1Gi"
          static_pv:
            volume_handle: "{{ steps.ensure_cluster.csi.static_volume_handle | default('', true) }}"
            csi_driver: "{{ steps.ensure_cluster.csi.static_driver_name | default('', true) }}"
            # Zonal block volumes (EBS/PD/Disk) must pin their consumer pod to
            # the volume's AZ; empty for zone-agnostic backends.
            zone: "{{ steps.ensure_cluster.csi.static_volume_az | default('', true) }}"
            fs_type: "ext4"
            capacity: "1Gi"
            access_mode: "ReadWriteOnce"
          bind_timeout_s: 180
          namespace_prefix: "isvtest-csi-prov"
        K8sCsiDriverHealthCheck:
          test_id: "N/A"
          labels: ["kubernetes", "min_req", "storage"]
          requires: [kubernetes]
          # Verifies each configured CSI driver is installed and healthy.
          # Controller/node health (Deployment + DaemonSet) runs only
          # when a spec supplies a `workloads` block; otherwise those subtests are
          # skipped (driver registration is still checked).
          #   - storage_classes: ["..."]
          #     workloads:
          #       namespace: kube-system
          #       controller: { deployment: <name> }
          #       node: { daemonset: <name> }
          drivers:
            - storage_classes:
                - "{{ steps.ensure_cluster.csi.block_storage_class | default('', true) }}"
              workloads: {}
            - storage_classes:
                - "{{ steps.ensure_cluster.csi.shared_fs_storage_class | default('', true) }}"
              workloads: {}
            - storage_classes:
                - "{{ steps.ensure_cluster.csi.nfs_storage_class | default('', true) }}"
              workloads: {}
          min_controller_replicas: 1
        K8sCsiConcurrentPvcCheck:
          test_id: "N/A"
          labels: ["kubernetes", "min_req", "storage"]
          requires: [kubernetes]
          storage_class: "{{ steps.ensure_cluster.csi.block_storage_class | default('', true) }}"
          pvc_count: 2
          pvc_size: "1Gi"
          bind_timeout_s: 120
          namespace_prefix: "isvtest-csi-concurrent"
        K8sCsiPvcExpandCheck:
          test_id: "N/A"
          labels: ["kubernetes", "min_req", "storage"]
          requires: [kubernetes]
          storage_class: "{{ steps.ensure_cluster.csi.block_storage_class | default('', true) }}"
          initial_size: "1Gi"
          expanded_size: "2Gi"
          bind_timeout_s: 120
          expand_timeout_s: 180
          namespace_prefix: "isvtest-csi-expand"
        K8sNodeKernelModulesCheck:
          test_id: "HSS11-04"
          labels: ["kubernetes", "storage"]
          requires: [kubernetes]
          kernel_modules: []
          node_selector: {}
          image: "busybox:1.36"
          bind_timeout_s: 60
          namespace_prefix: "isvtest-kmod"
        K8sNfsMountOptionsCheck:
          test_id: "HSS11-01"
          labels: ["kubernetes", "storage"]
          requires: [kubernetes]
          # Env overrides: K8S_CSI_SHARED_FS_SC, K8S_CSI_NFS_SC.
          shared_fs_storage_class: "{{ steps.ensure_cluster.csi.shared_fs_storage_class | default('', true) }}"
          nfs_storage_class: "{{ steps.ensure_cluster.csi.nfs_storage_class | default('', true) }}"
          image: "busybox:1.36"
          node_selector: {}
          pvc_size: "1Gi"
          bind_timeout_s: 180
          namespace_prefix: "isvtest-fs-nfs"
          # if expected values are not set, the check will be skipped
          expected_version: ""
          expected_nconnect: ""
          expected_proto: ""
          expected_read_ahead_kb: ""

    k8s_filesystem:
      step: ensure_cluster
      checks:
        # Shared-filesystem POSIX-semantics checks (multi-pod, RWX PVC).
        K8sFileLockingCheck:
          test_id: "HSS14-02"
          labels: ["kubernetes", "storage"]
          requires: [kubernetes]
          shared_fs_storage_class: "{{ steps.ensure_cluster.csi.shared_fs_storage_class | default('', true) }}"
          nfs_storage_class: "{{ steps.ensure_cluster.csi.nfs_storage_class | default('', true) }}"
          image: "busybox:1.36"
          node_selector: {}
          pvc_size: "1Gi"
          bind_timeout_s: 120
          release_timeout_s: 60
          namespace_prefix: "isvtest-fs-lock"
        K8sCrossNodeWriteVisibilityCheck:
          test_id: "HSS17-01"
          labels: ["kubernetes", "storage"]
          requires: [kubernetes]
          shared_fs_storage_class: "{{ steps.ensure_cluster.csi.shared_fs_storage_class | default('', true) }}"
          nfs_storage_class: "{{ steps.ensure_cluster.csi.nfs_storage_class | default('', true) }}"
          image: "busybox:1.36"
          node_selector: {}
          pvc_size: "1Gi"
          bind_timeout_s: 120
          visibility_window_s: 5.0
          namespace_prefix: "isvtest-fs-vis"
        K8sCrossNodeAttrConsistencyCheck:
          test_id: "HSS17-02"
          labels: ["kubernetes", "storage"]
          requires: [kubernetes]
          shared_fs_storage_class: "{{ steps.ensure_cluster.csi.shared_fs_storage_class | default('', true) }}"
          nfs_storage_class: "{{ steps.ensure_cluster.csi.nfs_storage_class | default('', true) }}"
          image: "busybox:1.36"
          node_selector: {}
          pvc_size: "1Gi"
          bind_timeout_s: 120
          attr_cache_window_s: 30.0
          extend_bytes: 1024
          namespace_prefix: "isvtest-fs-attr"
        K8sLargeDirListingFilesCheck:
          test_id: "HSS07-02"
          labels: ["kubernetes", "storage"]
          requires: [kubernetes]
          shared_fs_storage_class: "{{ steps.ensure_cluster.csi.shared_fs_storage_class | default('', true) }}"
          nfs_storage_class: "{{ steps.ensure_cluster.csi.nfs_storage_class | default('', true) }}"
          image: "busybox:1.36"
          node_selector: {}
          files_count: 10000
          pvc_size: "10Gi"
          bind_timeout_s: 120
          namespace_prefix: "isvtest-fs-bigdir"
          timeout: 3600
        K8sLargeDirListingDirsCheck:
          test_id: "HSS07-02"
          labels: ["kubernetes", "storage"]
          requires: [kubernetes]
          shared_fs_storage_class: "{{ steps.ensure_cluster.csi.shared_fs_storage_class | default('', true) }}"
          nfs_storage_class: "{{ steps.ensure_cluster.csi.nfs_storage_class | default('', true) }}"
          image: "busybox:1.36"
          node_selector: {}
          dirs_count: 500
          pvc_size: "10Gi"
          bind_timeout_s: 120
          namespace_prefix: "isvtest-fs-bigdir"
          timeout: 3600
        K8sPosixComplianceCheck:
          test_id: "DIR02-02"
          labels: ["kubernetes", "slow", "storage"]
          requires: [kubernetes]
          shared_fs_storage_class: "{{ steps.ensure_cluster.csi.shared_fs_storage_class | default('', true) }}"
          nfs_storage_class: "{{ steps.ensure_cluster.csi.nfs_storage_class | default('', true) }}"
          image: "gcc:12"
          node_selector: {}
          pvc_size: "5Gi"
          bind_timeout_s: 120
          build_timeout_s: 600
          # tests_subdir: ""  # optional: scope to a single tests/ subdir (e.g. "chmod")
          namespace_prefix: "isvtest-fs-posix"
          timeout: 3600

  exclude:
    labels: []
