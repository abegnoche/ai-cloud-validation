# my-isv Security Validation Configuration - Living Example
#
# Imports validations from the provider-agnostic security template and wires
# the commands to the generic template scripts in scripts/security/*. Those
# stubs ship with dummy-success values so this example runs end-to-end
# without any real infrastructure.
#
# Coverage:
#   SEC12-01: BMC management network (BmcManagementNetworkCheck)
#   SEC12-02: BMC tenant isolation (BmcTenantIsolationCheck)
#   SEC12-03: BMC bastion access (BmcBastionAccessCheck)
#   CNP10-01: BMC protocol security (BmcProtocolSecurityCheck)
#   SEC14-01: API endpoint isolation (ApiEndpointIsolationCheck)
#   SEC13-02: Insecure protocols disabled (InsecureProtocolsCheck)
#   SEC07-01: MFA enforcement (MfaEnforcedCheck)
#   SEC09-01: Certificate rotation cycle (CertRotationCycleCheck)
#   SEC09-02: Provider- and customer-managed KMS options (KmsEncryptionOptionCheck)
#   SEC09-03: Centralized KMS (CentralizedKmsCheck)
#   SEC09-04: Customer-managed keys / BYOK (CustomerManagedKeyCheck)
#   SEC03-01: Service account credentials (ServiceAccountCredentialCheck)
#   SEC01-01: OIDC user authentication (OidcUserAuthCheck)
#   SEC02-01: Short-lived credentials/tokens (ShortLivedCredentialsCheck)
#   SEC04-01: Least-privilege access policies (LeastPrivilegePolicyCheck)
#   SEC04-02: Minimal role out-of-scope denial (MinimalRoleEnforcementCheck)
#   SEC08-01: Management API audit-log entry metadata (AuditLogEntryCheck)
#   SEC08-02: Audit-log retention >= 30 days (AuditLogRetentionCheck)
#   SEC11-01: Hard tenant isolation across network/data/compute/storage (TenantIsolationCheck)
#
# Usage:
#   uv run isvctl test run -f isvctl/configs/providers/my-isv/config/security.yaml

import:
  - ../../../suites/security.yaml

version: "1.0"

commands:
  security:
    phases: ["setup", "test", "teardown"]
    steps:
      - name: preflight
        phase: setup
        command: "echo"
        args: ["{\"success\": true, \"platform\": \"security\", \"test_name\": \"preflight\"}"]
        timeout: 10

      - name: bmc_management_network
        phase: test
        command: "python ../scripts/security/bmc_management_network_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: bmc_tenant_isolation
        phase: test
        command: "python ../scripts/security/bmc_isolation_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: bmc_protocol_security
        phase: test
        command: "python ../scripts/security/bmc_protocol_security_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: bmc_bastion_access
        phase: test
        command: "python ../scripts/security/bmc_bastion_access_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: api_endpoint_isolation
        phase: test
        command: "python ../scripts/security/api_endpoint_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: insecure_protocols_test
        phase: test
        command: "python ../../shared/insecure_protocols_test.py"
        args: ["--endpoints={{insecure_protocols_endpoints}}"]
        timeout: 60

      - name: mfa_enforcement
        phase: test
        command: "python ../scripts/security/mfa_enforcement_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: cert_rotation_test
        phase: test
        command: "python ../scripts/security/cert_rotation_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: kms_encryption_options_test
        phase: test
        command: "python ../scripts/security/kms_encryption_options_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: centralized_kms_test
        phase: test
        command: "python ../scripts/security/centralized_kms_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: customer_managed_key_test
        phase: test
        command: "python ../scripts/security/customer_managed_key_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: sa_credential_test
        phase: test
        command: "python ../scripts/security/sa_credential_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: oidc_user_auth_test
        phase: test
        command: "python ../scripts/security/oidc_user_auth_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: short_lived_credentials_test
        phase: test
        command: "python ../scripts/security/short_lived_credentials_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: least_privilege_test
        phase: test
        command: "python ../scripts/security/least_privilege_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: audit_logging_test
        phase: test
        command: "python ../scripts/security/audit_logging_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: tenant_isolation_test
        phase: test
        command: "python ../scripts/security/tenant_isolation_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: teardown
        phase: teardown
        command: "python ../scripts/security/teardown.py"
        args: ["--region", "{{region}}"]
        timeout: 60

tests:
  cluster_name: "my-isv-security-validation"
  description: "my-isv security hardening validation (generic stubs, dummy overrides)"

  settings:
    region: "my-isv-region-1"
    insecure_protocols_endpoints: "{{env.EDGE_ENDPOINTS | default('', true)}}"
