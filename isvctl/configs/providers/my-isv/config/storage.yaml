# my-isv Storage Validation Configuration - Living Example
#
# Imports suites/storage.yaml (block volume + high-speed storage) and wires
# commands to the generic template scripts in scripts/storage/*. Those stubs
# ship with dummy-success values so this example runs end-to-end without any
# real cloud infrastructure (ISVCTL_DEMO_MODE=1, used by `make demo-test`).
#
# Block volume (setup/test/teardown fixture):
#   launch_instance, create_volume, snapshot_lifecycle, volume_resize,
#   volume_persistence, teardown_volume, teardown
#
# Home directory (self-contained test-phase step):
#   DirectoryFilesystemQuotaCheck, DirectoryUsageAccountingCheck,
#   DirectoryNfsAvailabilityCheck
#
# High-speed storage (self-contained test-phase steps; HSS checks ship
# unreleased — run with ISVTEST_INCLUDE_UNRELEASED=1 to exercise them):
#   HssStorageProvisioningCheck (HSS01-01), HssQosThroughputCheck (HSS02-01),
#   HssNonDisruptiveUpgradeCheck (HSS05-01), HssRdmaMemoryProtectionCheck (HSS06-01),
#   HssParallelFsProvisioningCheck (HSS07-01), HssMultipleFilesystemsCheck (HSS09-01),
#   HssLiveExpansionCheck (HSS10-01), HssQuotaEnforcementCheck (HSS12-01),
#   HssRootSquashCheck (HSS13-01), HssFlockMountCheck (HSS14-01),
#   HssChangelogAuditCheck (HSS15-01), HssMultipathCheck (HSS18-01).
#
# Usage:
#   uv run isvctl test run -f isvctl/configs/providers/my-isv/config/storage.yaml

import:
  - ../../../suites/storage.yaml

version: "1.0"

commands:
  storage:
    phases: ["setup", "test", "teardown"]
    steps:
      - name: setup_cluster
        phase: setup
        command: "python ../scripts/storage/setup_cluster.py"
        timeout: 60

      - name: launch_instance
        phase: setup
        command: "python ../scripts/vm/launch_instance.py"
        args:
          - "--name"
          - "isv-test-block"
          - "--instance-type"
          - "{{instance_type}}"
          - "--region"
          - "{{region}}"
        timeout: 60

      - name: create_volume
        phase: setup
        command: "python ../scripts/storage/create_volume.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
          - "--key-file"
          - "{{steps.launch_instance.key_file}}"
          - "--size-gib"
          - "{{volume_size_gib}}"
        timeout: 60

      - name: snapshot_lifecycle
        phase: test
        command: "python ../scripts/storage/snapshot_lifecycle.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
          - "--volume-id"
          - "{{steps.create_volume.volume_id}}"
          - "--key-file"
          - "{{steps.launch_instance.key_file}}"
          - "--expected-content"
          - "{{steps.create_volume.sentinel_content}}"
        timeout: 60

      - name: volume_resize
        phase: test
        command: "python ../scripts/storage/volume_resize.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
          - "--volume-id"
          - "{{steps.create_volume.volume_id}}"
          - "--key-file"
          - "{{steps.launch_instance.key_file}}"
          - "--mount-point"
          - "{{steps.create_volume.mount_point}}"
        timeout: 60

      - name: volume_persistence
        phase: test
        command: "python ../scripts/storage/volume_persistence.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
          - "--volume-id"
          - "{{steps.create_volume.volume_id}}"
          - "--key-file"
          - "{{steps.launch_instance.key_file}}"
          - "--mount-point"
          - "{{steps.create_volume.mount_point}}"
          - "--expected-content"
          - "{{steps.create_volume.sentinel_content}}"
        timeout: 60

      - name: home_directory_storage
        phase: test
        command: "python ../scripts/storage/home_directory_storage_test.py"
        requires_available_validations:
          - DirectoryFilesystemQuotaCheck
          - DirectoryUsageAccountingCheck
          - DirectoryNfsAvailabilityCheck
        args: ["--region", "{{region}}"]
        timeout: 60

      # High-speed storage (self-contained; demo stubs)
      - name: provision_storage
        phase: test
        command: "python ../scripts/storage/provision_storage_test.py"
        requires_available_validations:
          - HssStorageProvisioningCheck
        args: ["--region", "{{region}}", "--capacity-gib", "100"]
        timeout: 60

      - name: qos_throughput
        phase: test
        command: "python ../scripts/storage/qos_throughput_test.py"
        requires_available_validations:
          - HssQosThroughputCheck
        args: ["--region", "{{region}}", "--min-mbps", "1000", "--min-iops", "50000"]
        timeout: 60

      - name: non_disruptive_upgrade
        phase: test
        command: "python ../scripts/storage/non_disruptive_upgrade_test.py"
        requires_available_validations:
          - HssNonDisruptiveUpgradeCheck
        args: ["--region", "{{region}}", "--min-defer-days", "14"]
        timeout: 60

      - name: rdma_memory_protection
        phase: test
        command: "python ../scripts/storage/rdma_memory_protection_test.py"
        requires_available_validations:
          - HssRdmaMemoryProtectionCheck
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: provision_parallel_fs
        phase: test
        command: "python ../scripts/storage/provision_parallel_fs_test.py"
        requires_available_validations:
          - HssParallelFsProvisioningCheck
        args: ["--region", "{{region}}", "--fs-type", "parallel"]
        timeout: 60

      - name: multiple_filesystems
        phase: test
        command: "python ../scripts/storage/multiple_filesystems_test.py"
        requires_available_validations:
          - HssMultipleFilesystemsCheck
        args: ["--region", "{{region}}", "--count", "2", "--max-fs-tib", "50"]
        timeout: 60

      - name: live_expansion
        phase: test
        command: "python ../scripts/storage/live_expansion_test.py"
        requires_available_validations:
          - HssLiveExpansionCheck
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: quota_enforcement
        phase: test
        command: "python ../scripts/storage/quota_enforcement_test.py"
        requires_available_validations:
          - HssQuotaEnforcementCheck
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: root_squash
        phase: test
        command: "python ../scripts/storage/root_squash_test.py"
        requires_available_validations:
          - HssRootSquashCheck
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: flock_mount
        phase: test
        command: "python ../scripts/storage/flock_mount_test.py"
        requires_available_validations:
          - HssFlockMountCheck
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: changelog_audit
        phase: test
        command: "python ../scripts/storage/changelog_audit_test.py"
        requires_available_validations:
          - HssChangelogAuditCheck
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: multipath
        phase: test
        command: "python ../scripts/storage/multipath_test.py"
        requires_available_validations:
          - HssMultipathCheck
        args: ["--region", "{{region}}", "--servers", "3"]
        timeout: 60

      - name: teardown_volume
        phase: teardown
        command: "python ../scripts/storage/teardown_volume.py"
        requires: [vm, bare_metal]
        args:
          - "--region"
          - "{{region}}"
          - "--volume-id"
          - "{{steps.create_volume.volume_id}}"
          - "{{teardown_flag}}"
        timeout: 60

      - name: teardown
        phase: teardown
        command: "python ../scripts/vm/teardown.py"
        requires: [vm, bare_metal]
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
          - "--delete-key-pair"
          - "--delete-security-group"
        timeout: 60

tests:
  cluster_name: "my-isv-storage-validation"
  description: "my-isv storage validation (block volume + high-speed stubs, dummy overrides)"

  settings:
    region: "my-isv-region-1"
    instance_type: "my-isv.standard.1x"
    volume_size_gib: "10"
    teardown_flag: "{{(env.BLOCK_STORAGE_SKIP_TEARDOWN == 'true') | ternary('--skip-destroy', '')}}"
