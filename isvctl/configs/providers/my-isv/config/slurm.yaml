# my-isv Slurm Platform Suite - Living Example
#
# This is the obligation attached to declaring the `slurm` capability. It
# imports the provider-agnostic Slurm validation contract and wires the
# lifecycle to the generic scripts in scripts/slurm/*.
#
# Usage:
#   uv run isvctl test run --provider my-isv --suite slurm
#
# Unlike the other my-isv examples this one talks to a REAL cluster: the
# validations run sinfo/srun directly, so there is nothing for a dummy-success
# stub to return. That is why it is not part of `make demo-test`.
#
# ACTION: make the Slurm client commands (sinfo, scontrol, srun) resolve to
#   your cluster, then replace scripts/slurm/setup.sh with your own
#   provisioning if you want isvctl to create the cluster rather than reuse an
#   existing one.

import: ../../../suites/slurm.yaml

version: "1.0"

# Steps are overridden (not inherited) so the script paths resolve from this
# provider's config directory. Lists are replaced wholesale on merge.
commands:
  slurm:
    phases: ["setup", "test", "teardown"]
    steps:
      - name: setup
        phase: setup
        command: "../scripts/slurm/setup.sh"
        timeout: 120

      - name: teardown
        phase: teardown
        command: "../scripts/slurm/teardown.sh"
        timeout: 30

tests:
  description: "my-isv Slurm platform suite (real cluster required)"
