# my-isv Slurm capability wrapper
#
# Imports the canonical slurm suite and re-declares the setup/teardown commands
# with paths relative to THIS file (providers/my-isv/config/). The suite embeds
# `../providers/my-isv/scripts/...`-style paths that resolve from suites/; when
# imported here the working dir becomes this config's directory, so the command
# paths must be re-declared relative to it. This makes the slurm capability
# selectable via `--provider my-isv --capability slurm`.
#
# Note: not wired into `make demo-test` (MY_ISV_DOMAINS) - the slurm setup/teardown
# scripts have no ISVCTL_DEMO_MODE gate and expect a real cluster.

import:
  - ../../../suites/slurm.yaml

version: "1.0"

commands:
  slurm:
    phases: ["setup", "test", "teardown"]
    steps:
      - name: setup
        phase: setup
        command: "../scripts/slurm/setup.sh"
        timeout: 120
      - name: teardown
        phase: teardown
        command: "../scripts/slurm/teardown.sh"
        timeout: 30

tests:
  cluster_name: "my-isv-slurm-validation"
  description: "my-isv Slurm capability validation"
