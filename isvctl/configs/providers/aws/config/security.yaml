# AWS Security Validation Configuration
#
# Imports validations from the provider-agnostic security canonical config.
# This file only provides AWS-specific commands (boto3 scripts) and settings.
#
# Usage:
#   uv run isvctl test run -f isvctl/configs/providers/aws/config/security.yaml
#
# Estimated runtime: ~10-15 minutes typical.
# CloudTrail propagation and tenant-isolation fixture cleanup can make slow-path
# runs take substantially longer.
#
# Security tests (SEC* requirements):
#   1. BMC Management Network  - Verify BMC management is dedicated/restricted
#   2. BMC Tenant Isolation    - Verify BMC/IPMI/Redfish unreachable from VPC
#   3. BMC Protocol Security   - Verify CNP10-01 BMC protocol posture
#   4. BMC Bastion Access      - Verify BMC reachable only via hardened bastion
#   5. API Endpoint Isolation  - Verify management APIs are not publicly exposed
#   6. Mutual TLS              - Verify mTLS north-south/east-west (SEC13-01)
#   7. Insecure Protocols      - Verify SSLv3/TLS1.0/TLS1.1/plain HTTP disabled (SEC13-02)
#   8. MFA Enforcement         - Verify admin interfaces (UI, CLI, API) require MFA
#   9. Cert Rotation Cycle     - Verify cert rotation cycle / auto-renewal (SEC09-01)
#  10. KMS Options             - Verify provider- and customer-managed keys (SEC09-02)
#  11. Centralized KMS         - Verify encrypted resources resolve to KMS (SEC09-03)
#  12. Customer Managed Key    - Verify customer-managed key encryption (SEC09-04)
#  13. Least Privilege         - Verify scoped user/resource/network policies (SEC04-01/02)
#  14. Audit Logging           - Verify management-event logging and retention (SEC08-01/02)
#  15. SA Credential Auth      - Verify IAM user + long-lived access key auth
#  16. OIDC User Auth          - Probe configured OIDC-protected platform endpoint (SEC01-01)
#  17. Short-Lived Credentials - Verify STS issues node + workload creds with bounded TTL (SEC02-01)
#  18. Tenant Isolation        - Verify hard tenant isolation across network, data, compute and storage (SEC11-01)
#  19. Capacity Grouping       - Verify reservations are grouped and tenant-pinned (CAP04-01)
#  20. Topology Block          - Verify topology block atomic allocation boundaries (CAP04-02)
#
# Note: SEC12-* (BMC) tests cannot be fully validated on AWS because the
# Nitro/hypervisor BMC plane is provider-hidden. The references inspect the
# customer-visible boundary (tenant CIDRs, route tables, NACLs, SG rules) and
# pass with a "provider_hidden" marker when no customer-tagged BMC resources
# are present. Self-managed NCPs running their own BMC fabric should tag
# resources with bmc/ipmi/redfish/oob/out-of-band to enable strict
# enforcement.

import:
  - ../../../suites/security.yaml

version: "1.0"

commands:
  security:
    phases: ["setup", "test", "teardown"]
    steps:
      # Preflight: minimal setup step so the orchestrator runs teardown
      - name: preflight
        phase: setup
        command: "echo"
        args: ["{\"success\": true, \"platform\": \"security\", \"test_name\": \"preflight\"}"]
        timeout: 10

      # Test 1: BMC Management Network (~10s)
      - name: bmc_management_network
        phase: test
        command: "python3 ../scripts/security/bmc_management_network_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      # Test 2: BMC Tenant Isolation (~10s)
      - name: bmc_tenant_isolation
        phase: test
        command: "python3 ../scripts/security/bmc_isolation_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      # Test 3: BMC Protocol Security (AWS has no customer BMC endpoint)
      - name: bmc_protocol_security
        phase: test
        command: "python3 ../scripts/security/bmc_protocol_security_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      # Test 4: BMC Bastion Access (~10s)
      - name: bmc_bastion_access
        phase: test
        command: "python3 ../scripts/security/bmc_bastion_access_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      # Test 5: API Endpoint Isolation (~15s)
      - name: api_endpoint_isolation
        phase: test
        command: "python3 ../scripts/security/api_endpoint_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      # Test 6a: Mutual TLS (SEC13-01)
      # Probes EDGE_ENDPOINTS / EAST_WEST_ENDPOINTS with MTLS_* cert material.
      # Without endpoints the shared script emits a structured skip. East-west
      # is provider-hidden on AWS unless EAST_WEST_ENDPOINTS is set (intra-VPC
      # service mTLS is customer-owned mesh/sidecar), expressed via the
      # provider-hidden message below.
      - name: mutual_tls_test
        phase: test
        command: "python3 ../../shared/mutual_tls_test.py"
        args:
          - >-
            --east-west-provider-hidden-message=east_west_mtls_enforced:
            AWS EC2/EKS tenants do not receive a customer-provable east-west
            mTLS surface in region {{region}}; intra-VPC service encryption is
            customer-owned (mesh/sidecar). Set EAST_WEST_ENDPOINTS to probe
            platform-specific east-west endpoints when available.
        timeout: 120

      # Test 6b: Insecure Protocols (SEC13-02)
      # Provisions a temporary TLS-only ALB fixture, probes it for legacy
      # protocol refusal, then tears it down. When the orchestrator principal
      # lacks fixture permissions the script emits a structured skip.
      - name: insecure_protocols_test
        phase: test
        command: "python3 ../scripts/security/insecure_protocols_test.py"
        args: ["--region", "{{region}}"]
        timeout: 1020

      # Test 7: MFA Enforcement (~10s)
      - name: mfa_enforcement
        phase: test
        command: "python3 ../scripts/security/mfa_enforcement_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      # Test 8: Certificate Rotation Cycle (SEC09-01, read-only)
      - name: cert_rotation_test
        phase: test
        command: "python3 ../scripts/security/cert_rotation_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      # Test 9: KMS Encryption Options (SEC09-02, creates temporary CMK)
      - name: kms_encryption_options_test
        phase: test
        command: "python3 ../scripts/security/kms_encryption_options_test.py"
        args: ["--region", "{{region}}"]
        timeout: 120

      # Test 10: Centralized KMS (SEC09-03, bounded read-only sample)
      - name: centralized_kms_test
        phase: test
        command: "python3 ../scripts/security/centralized_kms_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      # Test 11: Customer Managed Key / BYOK (~30s)
      - name: customer_managed_key_test
        phase: test
        command: "python3 ../scripts/security/customer_managed_key_test.py"
        args:
          - "--region"
          - "{{region}}"
          - "--key-id={{customer_managed_key_id}}"
        timeout: 120

      # Test 12: Least-Privilege Policy + Minimal Role Enforcement (SEC04-01/02)
      # Self-contained: provisions a temporary IAM user, two tagged buckets, and a minimal
      # VPC/subnet/security-group/instance fixture for EC2 DryRun probes. It attaches one
      # inline policy scoped by identity, resource, and aws:SourceIp, then verifies the
      # allowed S3 ListBucket path plus denied out-of-scope compute/storage/network API
      # probes. Cleans up the user, access key, inline policy, buckets, object, and EC2
      # fixture in a finally block.
      #
      # Orchestrator principal needs:
      #   iam:CreateUser, iam:PutUserPolicy, iam:CreateAccessKey, iam:DeleteUserPolicy,
      #   iam:DeleteAccessKey, iam:DeleteUser, s3:CreateBucket, s3:PutBucketTagging,
      #   s3:PutObject, s3:DeleteObject, s3:DeleteBucket, ec2:DescribeImages,
      #   ec2:CreateVpc, ec2:CreateSubnet, ec2:CreateSecurityGroup, ec2:RunInstances,
      #   ec2:TerminateInstances, ec2:CreateTags, and matching delete permissions
      # When IAM create-user permissions are missing the step emits a structured skip.
      - name: least_privilege_test
        phase: test
        command: "python3 ../scripts/security/least_privilege_test.py"
        args: ["--region", "{{region}}"]
        timeout: 420

      # Test 13: Audit Logging + Retention (SEC08-01/02)
      # Emits one EC2 DescribeRegions management call with a unique User-Agent suffix, polls
      # CloudTrail LookupEvents for the matching request id, then verifies metadata fields.
      # Separately resolves an active multi-region trail's S3 destination and confirms
      # lifecycle expiration, when present, is >= 30 days. CloudTrail event ingestion may
      # legitimately exceed the poll budget; that case is a structured skip rather than a
      # fabricated pass.
      #
      # Orchestrator principal needs:
      #   ec2:DescribeRegions, cloudtrail:DescribeTrails,
      #   cloudtrail:GetTrailStatus, cloudtrail:LookupEvents,
      #   s3:GetBucketLifecycleConfiguration
      - name: audit_logging_test
        phase: test
        command: "python3 ../scripts/security/audit_logging_test.py"
        args: ["--region", "{{region}}"]
        timeout: 30

      # Test 14: Service Account Credential Auth (~30s, includes IAM propagation wait)
      - name: sa_credential_test
        phase: test
        command: "python3 ../scripts/security/sa_credential_test.py"
        args: ["--region", "{{region}}"]
        timeout: 120

      # Test 15: OIDC User Authentication
      # Requires a real issuer, audience, protected target endpoint, and token fixtures.
      # Non-sensitive endpoint settings can come from tests.settings below; token fixtures
      # are read by the script from OIDC_*_TOKEN env vars or passed through token-file
      # arguments in a custom overlay.
      - name: oidc_user_auth_test
        phase: test
        command: "python3 ../scripts/security/oidc_user_auth_test.py"
        args:
          - "--region"
          - "{{region}}"
          - "--issuer-url={{oidc_issuer_url}}"
          - "--audience={{oidc_audience}}"
          - "--target-url={{oidc_target_url}}"
        sensitive_args:
          - "--valid-token"
          - "--wrong-issuer-token"
          - "--wrong-audience-token"
          - "--expired-token"
          - "--missing-required-claim-token"
        timeout: 60

      # Test 16: Short-Lived Credentials (SEC02-01)
      # Self-contained: provisions a fresh IAM user with an inline policy granting just
      # sts:GetSessionToken + sts:GetFederationToken, mints an access key, probes both
      # APIs to assert each returned credential has a finite TTL within the configured
      # upper bound, then cleans the user up in a finally block. Works from assumed-role/
      # SSO orchestrator principals because the probes run as the freshly provisioned IAM
      # user, not as the caller.
      #
      # Orchestrator principal needs:
      #   iam:CreateUser, iam:PutUserPolicy, iam:CreateAccessKey,
      #   iam:DeleteUserPolicy, iam:DeleteAccessKey, iam:DeleteUser
      # When those are missing the step emits a structured skip.
      - name: short_lived_credentials_test
        phase: test
        command: "python3 ../scripts/security/short_lived_credentials_test.py"
        args:
          - "--region"
          - "{{region}}"
          - "--max-ttl-seconds={{short_lived_credentials_max_ttl_seconds}}"
        # Same envelope as sa_credential_test: provisions an IAM user and
        # waits on IAM->STS propagation (worst case ~46s of backoff).
        timeout: 120

      # Test 17: Tenant Isolation (SEC11-01)
      # Self-contained: provisions two ephemeral tenants, each with VPC, IAM user with
      # scoped inline policy, KMS CMK, S3 bucket, t3.micro EC2, and EBS volume. It runs
      # cross-tenant negative probes from tenant A's IAM creds against tenant B's
      # resources, asserting AccessDenied across network/data/compute/storage surfaces.
      # Tears the fixture down in a finally block.
      #
      # Orchestrator principal needs ec2:*, iam:CreateUser/PutUserPolicy/CreateAccessKey/
      # Delete*, kms:CreateKey/CreateAlias/Schedule*, s3:CreateBucket/PutBucketTagging/
      # DeleteBucket, plus matching describe perms. When those are missing the step emits
      # a structured skip.
      #
      # Setup launches two t3.micro instances and waits for instance termination during
      # teardown (~60s end-to-end on a warm region).
      - name: tenant_isolation_test
        phase: test
        command: "python3 ../scripts/security/tenant_isolation_test.py"
        args: ["--region", "{{region}}"]
        timeout: 600

      # CAP04-01: Capacity reservation grouping and tenant pinning.
      - name: capacity_reservation_grouping
        phase: test
        command: "python3 ../scripts/capacity/reservation_grouping.py"
        requires_available_validations:
          - CapacityReservationGroupingCheck
        args:
          - "--region"
          - "{{region}}"
          - "--instance-type"
          - "{{capacity_instance_type}}"
          - "--availability-zone={{capacity_availability_zone}}"
          - "--resource-group-name"
          - "{{capacity_resource_group_name}}"
          - "--reservation-count"
          - "{{capacity_reservation_count}}"
        timeout: 300

      # CAP04-02: Topology block atomic allocation.
      - name: topology_block_atomic_allocation
        phase: test
        command: "python3 ../scripts/capacity/topology_block_atomic_allocation.py"
        requires_available_validations:
          - CapacityTopologyBlockAtomicAllocationCheck
        args:
          - "--region"
          - "{{region}}"
          - "--tenant-id={{tenant_id}}"
          - "--topology-block-id"
          - "{{topology_block_id}}"
          - "--instance-type"
          - "{{capacity_instance_type}}"
          - "--instance-platform"
          - "{{instance_platform}}"
          - "--availability-zone={{topology_availability_zone}}"
          - "--placement-group"
          - "{{placement_group}}"
          - "--requested-nodes"
          - "{{requested_compute}}"
          - "--requested-network"
          - "{{requested_network}}"
          - "--requested-storage"
          - "{{requested_storage}}"
          - "{{topology_skip_destroy_flag}}"
        timeout: 1800

      # Sweep CAP04-02 topology block resources (instances, reservation,
      # placement group) tagged for this block. The in-run step self-cleans in
      # its finally block; this teardown step reclaims resources left behind
      # when AWS_CAPACITY_SKIP_DESTROY=true (a no-op while that flag is set, so
      # a later standalone `--phase teardown` without it does the cleanup).
      # Mirrors the gate inferred on topology_block_atomic_allocation (its only
      # check is vm/bare_metal): a core run allocates no block, so it must not
      # try to release one.
      - name: topology_block_teardown
        phase: teardown
        command: "python3 ../scripts/capacity/topology_block_atomic_allocation.py"
        requires: [vm, bare_metal]
        requires_available_validations:
          - CapacityTopologyBlockAtomicAllocationCheck
        args:
          - "--teardown"
          - "--region"
          - "{{region}}"
          - "--topology-block-id"
          - "{{topology_block_id}}"
          - "--instance-type"
          - "{{capacity_instance_type}}"
          - "--availability-zone={{topology_availability_zone}}"
          - "--placement-group"
          - "{{placement_group}}"
          - "--requested-nodes"
          - "{{requested_compute}}"
          - "--requested-network"
          - "{{requested_network}}"
          - "--requested-storage"
          - "{{requested_storage}}"
          - "{{topology_skip_destroy_flag}}"
        timeout: 600

      # Cancel CAP04-01 reservations and delete the Resource Group only when
      # this run created it. AWS_CAPACITY_SKIP_DESTROY=true makes this a no-op
      # so resources can be inspected and torn down later.
      - name: capacity_teardown
        phase: teardown
        command: "python3 ../scripts/capacity/reservation_grouping.py"
        requires: [vm, bare_metal]
        requires_available_validations:
          - CapacityReservationGroupingCheck
        args:
          - "--teardown"
          - "--region"
          - "{{region}}"
          - "--resource-group-name"
          - "{{capacity_resource_group_name}}"
          - "--created-reservation-id={{ steps.capacity_reservation_grouping.created_reservation_id | default('', true) }}"
          - "{{ steps.capacity_reservation_grouping.reservation_created | default(false) | ternary('--reservation-created', '') }}"
          - "{{ steps.capacity_reservation_grouping.resource_group_created | default(false) | ternary('--delete-group', '') }}"
          - "{{capacity_skip_destroy_flag}}"
        timeout: 300

      # Teardown: Safety-net sweep for leftover IAM users + SEC11 fixture.
      # 300s budget covers worst-case instance-terminated waiter
      # (5s delay * 60 attempts) plus VPC dependency unwinding when a
      # prior run died mid-fixture.
      - name: teardown
        phase: teardown
        command: "python3 ../scripts/security/teardown.py"
        args: ["--region", "{{region}}"]
        timeout: 300

tests:
  cluster_name: "aws-security-validation"
  description: "AWS infrastructure security hardening validation"

  settings:
    region: "us-west-2"
    tenant_id: "{{env.AWS_ACCOUNT_ID | default('', true)}}"
    topology_block_id: "aws-cap04-block"
    capacity_instance_type: "m6i.large"
    instance_platform: "Linux/UNIX"
    capacity_availability_zone: ""
    topology_availability_zone: "{{env.AWS_AVAILABILITY_ZONE | default('', true)}}"
    placement_group: "aws-cap04-block-pg"
    capacity_resource_group_name: "isv-capacity-cap04"
    capacity_reservation_count: 1
    requested_compute: 2
    requested_network: 1
    requested_storage: 0
    capacity_skip_destroy_flag: "{{(env.AWS_CAPACITY_SKIP_DESTROY == 'true') | ternary('--skip-destroy', '')}}"
    topology_skip_destroy_flag: "{{(env.AWS_CAPACITY_SKIP_DESTROY == 'true') | ternary('--skip-destroy', '')}}"
    oidc_issuer_url: "{{env.OIDC_ISSUER_URL | default('', true)}}"
    oidc_audience: "{{env.OIDC_AUDIENCE | default('', true)}}"
    oidc_target_url: "{{env.OIDC_TARGET_URL | default('', true)}}"
    customer_managed_key_id: "{{env.AWS_KMS_KEY_ID | default('', true)}}"
    short_lived_credentials_max_ttl_seconds: "{{env.SEC02_MAX_TTL_SECONDS | default('43200', true)}}"
