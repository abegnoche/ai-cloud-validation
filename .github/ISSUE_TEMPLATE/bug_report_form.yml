name: Bug Report
description: File a bug report
title: "bug: "
labels: ["bug"]
type: Bug

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of ISV NCP Validation Suite are you running?
      placeholder: "output of `isvctl --version` (e.g. isvctl 0.1.0)"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: The `tests.platform` value from your config, or "Not platform-specific" for bugs in the CLI/orchestrator itself.
      options:
        - bare_metal
        - control_plane
        - iam
        - image_registry
        - kubernetes
        - network
        - security
        - slurm
        - vm
        - Not platform-specific
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: Also tell us what you expected to happen.
      placeholder: XYZ occurred, I expected QRS results
    validations:
      required: true

  - type: textarea
    id: mvr
    attributes:
      label: Minimum reproducible example
      description: Please supply a [minimum reproducible example](https://matthewrocklin.com/blog/work/2018/02/28/minimal-bug-reports) here. Include the `isvctl` command and any config files used.
      render: shell

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please paste relevant error and log output here.
      render: shell

  - type: textarea
    id: misc
    attributes:
      label: Other/Misc.
      description: Please enter any other helpful information here.

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://github.com/NVIDIA/ai-cloud-validation/blob/main/CODE_OF_CONDUCT.md)
      options:
        - label: I agree to follow ISV NCP Validation Suite's Code of Conduct
          required: true
        - label: I have searched the [open bugs](https://github.com/NVIDIA/ai-cloud-validation/issues?q=is%3Aopen+is%3Aissue+type:Bug) and have found no duplicates for this bug report
          required: true
