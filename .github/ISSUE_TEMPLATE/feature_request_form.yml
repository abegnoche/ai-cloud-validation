name: Feature/Enhancement Request Form
description: Request new or improved functionality or changes to existing functionality
title: "feat: "
labels: ["feature"]
type: Enhancement

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this feature request!

  - type: dropdown
    id: new_or_improvement
    attributes:
      label: Is this a new feature, an enhancement, or a change to existing functionality?
      options:
        - New Feature
        - Enhancement
        - Change
    validations:
      required: true

  - type: dropdown
    id: criticality
    attributes:
      label: How would you describe the priority of this feature request
      options:
        - Critical (currently preventing usage)
        - High
        - Medium
        - Low (would be nice)
      default: 2
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Please provide a clear description of the problem this feature solves
      description: Real usage examples are especially helpful, non-code.
    validations:
      required: true

  - type: textarea
    id: feature_description
    attributes:
      label: Feature Description
      description: Please provide a clear description of the feature you are requesting.
      placeholder: >
        For new feature requests, please use one of the following formats:

        1. From an end-user perspective, use the user story format:
           "As a <role>, I want <capability>, so that <benefit>."
        2. From a system perspective, use the EARS format:
           "The <system> shall <response> when <trigger>."

        For changes or improvements to an existing feature, please reference the previous Feature Request ID if available.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe your ideal solution
      description: Please describe the functionality you would like added.

  - type: textarea
    id: alternatives
    attributes:
      label: Describe any alternatives you have considered
      description: List any other tools, libraries, or approaches you have looked at or tried.

  - type: textarea
    id: misc
    attributes:
      label: Additional context
      description: Add any other context, code examples, or references to existing implementations about the feature request here. If applicable, please list the affected packages (`isvctl`, `isvtest`, `isvreporter`).

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://github.com/NVIDIA/ai-cloud-validation/blob/main/CODE_OF_CONDUCT.md)
      options:
        - label: I agree to follow ISV NCP Validation Suite's Code of Conduct
          required: true
        - label: I have searched the [open feature requests](https://github.com/NVIDIA/ai-cloud-validation/issues?q=is%3Aopen+is%3Aissue+type:Enhancement) and have found no duplicates for this feature request
          required: true
